steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/wally-private-storage/wally-backend:$COMMIT_SHA', '-f', 'wally-registry-backend/Dockerfile', '.']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/wally-private-storage/wally-backend:$COMMIT_SHA']
  - name: "gcr.io/cloud-builders/gcloud"
    args:
      [
        "run", "deploy", "wally-backend",
        "--image", "gcr.io/wally-private-storage/wally-backend:$COMMIT_SHA",
        "--region", "us-central1",
        "--platform", "managed",
        "--command", "./launch",
        "--port", "8000",
        "--allow-unauthenticated",
      ]
timeout: 900s
options:
  machineType: 'E2_HIGHCPU_8'
  defaultLogsBucketBehavior: REGIONAL_USER_OWNED_BUCKET