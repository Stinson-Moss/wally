steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/wally-private-storage/wally-backend:$COMMIT_SHA', '-f', 'wally-registry-backend/Dockerfile', '.']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/wally-private-storage/wally-backend:$COMMIT_SHA']
  - name: "gcr.io/cloud-builders/gcloud"
    args:
      [
        "run", "deploy", "wally-backend",
        "--image", "gcr.io/wally-private-storage/wally-backend:$COMMIT_SHA",
        "--region", "us-central1",
        "--platform", "managed",
        "--command", "./launch",
        "--port", "8000",
        "--allow-unauthenticated",
        "--service-account", "wally-registry@wally-private-storage.iam.gserviceaccount.com",
        "--set-env-vars", "GOOGLE_APPLICATION_CREDENTIALS=/secrets/SERVICE_ACCOUNT,WALLY_storage={type=\"gcs\",bucket=\"wally-zips\"},WALLY_INDEX_URL=https://github.com/Stinson-Moss/wally-index",
        "--set-secrets", "WALLY_github_token=WALLY_GITHUB_TOKEN:latest,WALLY_auth=WALLY_ROCKET_AUTH:latest,/secrets/SERVICE_ACCOUNT=WALLY_SERVICE_ACCOUNT:latest",
      ]
timeout: 900s
options:
  machineType: 'E2_HIGHCPU_8'
  defaultLogsBucketBehavior: REGIONAL_USER_OWNED_BUCKET